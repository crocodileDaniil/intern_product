services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://cp_user:cp_password@db:5432/cp_db
      ADMIN_TOKEN: admin-token
      SPECIALIST_TOKEN: specialist-token
      USER_TOKEN: user-token
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cp_db
      POSTGRES_USER: cp_user
      POSTGRES_PASSWORD: cp_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cp_user -d cp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
